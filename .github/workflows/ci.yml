name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # See publish.yml for why we use `install` over `ci`.
      - run: npm install --no-audit --no-fund

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build
